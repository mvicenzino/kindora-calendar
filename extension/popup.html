<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kindora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 180px;
      background: #0d111a;
      color: #e6edf3;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .wordmark {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #f1f5f9;
    }
    .wordmark-dot {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: #f97316;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .family-name {
      font-size: 11px;
      color: #8b949e;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .open-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: none;
      background: rgba(255,255,255,0.06);
      color: #8b949e;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .open-link:hover { background: rgba(255,255,255,0.12); color: #e6edf3; }
    .open-link svg { width: 13px; height: 13px; }

    /* ── Sign-in state ──────────────────────────────────────── */
    .signin-state {
      padding: 28px 20px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .signin-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(249,115,22,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f97316;
    }
    .signin-icon svg { width: 22px; height: 22px; }
    .signin-title { font-size: 14px; font-weight: 600; color: #e6edf3; }
    .signin-sub { font-size: 12px; color: #8b949e; line-height: 1.5; max-width: 220px; }
    .btn-signin {
      margin-top: 4px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-signin:hover { background: #ea6c0a; }

    /* ── Next-up card ───────────────────────────────────────── */
    .next-up {
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .next-up-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .next-up-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .next-up-countdown {
      font-size: 12px;
      font-weight: 600;
      color: #f97316;
    }
    .next-up-countdown.in-progress { color: #3fb950; }
    .next-up-countdown.all-clear { color: #8b949e; font-weight: 400; }
    .next-up-title {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.3;
    }
    .next-up-time {
      font-size: 11px;
      color: #8b949e;
      margin-top: 1px;
    }
    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-right: 1px;
    }

    /* ── Events list ────────────────────────────────────────── */
    .events-section {
      padding: 10px 14px 4px;
    }
    .events-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #8b949e;
      margin-bottom: 6px;
    }
    .event-row {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .event-row:last-child { border-bottom: none; }
    .event-row.past { opacity: 0.38; }
    .event-row.current { opacity: 1; }
    .event-dot-col { padding-top: 5px; flex-shrink: 0; }
    .event-body { flex: 1; min-width: 0; }
    .event-title {
      font-size: 13px;
      font-weight: 500;
      color: #e6edf3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .event-row.current .event-title { font-weight: 600; color: #f1f5f9; }
    .event-time {
      font-size: 11px;
      color: #8b949e;
      margin-top: 1px;
    }
    .current-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      background: rgba(63,185,80,0.15);
      color: #3fb950;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── No events ──────────────────────────────────────────── */
    .no-events {
      padding: 20px 14px 16px;
      text-align: center;
      color: #8b949e;
      font-size: 12px;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer {
      padding: 10px 14px 12px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-link {
      font-size: 11px;
      color: #8b949e;
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: color 0.15s;
    }
    .footer-link:hover { color: #e6edf3; }
    .footer-family-switcher {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #8b949e;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: color 0.15s;
    }
    .footer-family-switcher:hover { color: #e6edf3; }
    .footer-family-switcher svg { width: 11px; height: 11px; }

    /* ── Loading skeleton ───────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 5px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-line { height: 12px; margin-bottom: 6px; }
    .skeleton-title { height: 16px; width: 75%; margin-bottom: 4px; }
    .skeleton-sub { height: 11px; width: 50%; }
    .loading-wrap { padding: 18px 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="wordmark">
      <div class="wordmark-dot">K</div>
      Kindora
    </div>
    <div class="header-right">
      <span class="family-name" id="family-name"></span>
      <a class="open-link" id="open-app" href="https://kindora.ai" target="_blank" title="Open Kindora">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </div>
  </div>

  <div id="content">
    <div class="loading-wrap">
      <div class="skeleton skeleton-line" style="width:60%;margin-bottom:10px;"></div>
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-sub"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
